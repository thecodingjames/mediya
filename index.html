<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>

    <link href="/vendor/material-icons.css" rel="stylesheet" type="text/css">
    <link href="/vendor/animate.css" rel="stylesheet" type="text/css">
    <link href="/vendor/quasar.css" rel="stylesheet" type="text/css">

    <script src="/vendor/vue.js" defer></script>
    <script src="/vendor/vue-router.js" defer></script>
    <script src="/vendor/quasar.js" defer></script>
    <script src="/vendor/quasar.fr.js" defer></script>

    <script src="/vendor/videojs.min.js"></script>
    <link href="/vendor/videojs.min.css" rel="stylesheet" />

    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

    <link rel="icon" type="image/png" href="/assets/favicon/favicon.png"/>
    <link rel="apple-touch-icon" sizes="144x144" href="/assets/favicon/icon-144x144.png" />

    <link href="/global.css" rel="stylesheet" />
  </head>

  <body>
    <div id="app" style="height: 100dvh;"></div>

    <script type="module">
        import App from '/js/app.js'
        import QuasarConfig from '/config/quasar.js'
        import Router from '/config/router.js'

        const app = Vue.createApp(App)

        app.use(VueRouter.createRouter(Router))

        app.use(Quasar, QuasarConfig)
        Quasar.Lang.set(Quasar.Lang.fr)

        app.mount('#app')
    </script>
</html>
